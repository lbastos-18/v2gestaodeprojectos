<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login • Gestão de Projectos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/public.css">
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center;">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Acesso ao Sistema</h1>
        <p>Gestão de Projectos Académicos</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Correio Electrónico</label>
          <div class="form-control-wrapper">
            <i class="bi bi-envelope"></i>
            <input type="email" id="email" name="email" class="form-control" placeholder="usuario@exemplo.com" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Palavra-passe</label>
          <div class="form-control-wrapper">
            <i class="bi bi-lock"></i>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
          </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; margin-bottom: 2rem;">
          <label style="margin: 0;">
            <input type="checkbox" name="remember"> Lembrar-me
          </label>
          <a href="#" style="color: var(--primary); text-decoration: none;">Esqueci a palavra-passe</a>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%;">
          <i class="bi bi-lock-fill"></i> Entrar
        </button>
      </form>

      <div style="text-align: center; margin-top: 2rem; color: #666; font-size: 0.9rem;">
        <p>Não possui conta? <a href="register.html" style="color: var(--primary); text-decoration: none; font-weight: 500;">Registrar</a></p>
      </div>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData(e.target);
      const data = {
        email: formData.get('email'),
        password: formData.get('password')
      };

      try {
        const response = await fetch('../backend/auth.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await response.json();
        if (result.success) {
          window.location.href = '../admin/admindashboard.html';
        } else {
          alert(result.message || 'Erro ao fazer login');
        }
      } catch (error) {
        console.error('Erro:', error);
        alert('Erro ao conectar ao servidor');
      }
    });
  </script>
</body>
</html>
