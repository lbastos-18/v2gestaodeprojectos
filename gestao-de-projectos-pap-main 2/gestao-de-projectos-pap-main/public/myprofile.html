<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meu Perfil • Gestão de Projectos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/public.css">
</head>
<body>

  <div id="siteNavbar"></div>

  <section class="hero">
    <div class="container">
      <h1>Meu Perfil</h1>
      <p>Gerencie sua conta e informações pessoais</p>
    </div>
  </section>

  <main class="container" style="padding: 3rem 0;">
    <div style="display: grid; grid-template-columns: 280px 1fr; gap: 2rem;">
      <aside>
        <div style="background: white; padding: 2rem; border-radius: 0.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center;">
          <div style="font-size: 4rem; color: #ccc; margin-bottom: 1.5rem;">
            <i class="bi bi-person-circle"></i>
          </div>
          <h3 id="profileName" style="margin-bottom: 0.5rem; color: #2c3e50;">Nome do Utilizador</h3>
          <p id="profileRole" style="color: #999; font-size: 0.95rem; margin-bottom: 1.5rem;">Aluno</p>
          <button id="logoutBtn" class="btn-primary" style="width: 100%;">
            <i class="bi bi-box-arrow-right"></i> Sair
          </button>
        </div>
      </aside>

      <div>
        <div style="background: white; border-radius: 0.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden;">
          <div style="border-bottom: 1px solid #eee; display: flex; gap: 0;">
            <button class="tab-btn active" data-tab="info" style="flex: 1; padding: 1rem; border: none; background: transparent; cursor: pointer; color: #666; border-bottom: 3px solid transparent; font-weight: 500;">
              <i class="bi bi-person"></i> Informação
            </button>
            <button class="tab-btn" data-tab="security" style="flex: 1; padding: 1rem; border: none; background: transparent; cursor: pointer; color: #666; border-bottom: 3px solid transparent; font-weight: 500;">
              <i class="bi bi-shield-lock"></i> Segurança
            </button>
            <button class="tab-btn" data-tab="projects" style="flex: 1; padding: 1rem; border: none; background: transparent; cursor: pointer; color: #666; border-bottom: 3px solid transparent; font-weight: 500;" data-admin-only>
              <i class="bi bi-briefcase"></i> Meus Projectos
            </button>
          </div>

          <div style="padding: 2rem;">
            <div class="tab-content" data-tab="info" style="display: block;">
              <form id="profileForm">
                <div class="form-group">
                  <label for="fullName">Nome Completo</label>
                  <input type="text" id="fullName" name="fullName" class="form-control" placeholder="Seu nome completo">
                </div>

                <div class="form-group">
                  <label for="email">Correio Electrónico</label>
                  <input type="email" id="email" name="email" class="form-control" placeholder="seu.email@exemplo.com" readonly>
                </div>

                <div class="form-group">
                  <label for="role">Tipo de Utilizador</label>
                  <select id="role" class="form-control" disabled>
                    <option>Aluno</option>
                  </select>
                </div>

                <button type="submit" class="btn-primary">
                  <i class="bi bi-check"></i> Guardar Alterações
                </button>
              </form>

              <hr style="margin: 2rem 0; border-top: 1px solid #eee;">

              <h3 style="font-size: 1.2rem; color: #2c3e50; margin-bottom: 1.5rem;">
                <i class="bi bi-briefcase"></i> Os Meus Projectos
              </h3>
              <div id="myProjectsList" style="display: grid; gap: 1rem;">
                <p style="color: #999; font-size: 0.95rem;">A carregar projectos...</p>
              </div>
            </div>

            <div class="tab-content" data-tab="security" style="display: none;">
              <form id="passwordForm">
                <div class="form-group">
                  <label for="currentPassword">Password Actual</label>
                  <input type="password" id="currentPassword" name="currentPassword" class="form-control" placeholder="Introduza sua password actual">
                </div>

                <div class="form-group">
                  <label for="newPassword">Nova Password</label>
                  <input type="password" id="newPassword" name="newPassword" class="form-control" placeholder="Introduza a nova password" minlength="6">
                </div>

                <div class="form-group">
                  <label for="confirmPassword">Confirmar Password</label>
                  <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="Confirme a nova password" minlength="6">
                </div>

                <button type="submit" class="btn-primary">
                  <i class="bi bi-shield-check"></i> Alterar Password
                </button>
              </form>
            </div>

            <div class="tab-content" data-tab="projects" style="display: none;" data-admin-only>
              <form id="createAdminForm">
                <h3 style="font-size: 1.2rem; color: #2c3e50; margin-bottom: 1.5rem;">
                  <i class="bi bi-person-plus"></i> Criar Novo Administrador
                </h3>

                <div class="form-group">
                  <label for="newAdminName">Nome</label>
                  <input type="text" id="newAdminName" name="name" class="form-control" placeholder="Nome completo" required>
                </div>

                <div class="form-group">
                  <label for="newAdminEmail">Correio Electrónico</label>
                  <input type="email" id="newAdminEmail" name="email" class="form-control" placeholder="email@exemplo.com" required>
                </div>

                <div class="form-group">
                  <label for="newAdminPassword">Password</label>
                  <input type="password" id="newAdminPassword" name="password" class="form-control" placeholder="••••••••" required minlength="6">
                </div>

                <button type="submit" class="btn-primary" style="background-color: #e74c3c;">
                  <i class="bi bi-person-check"></i> Criar Administrador
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p style="margin: 0;">© Santa Ana & Noesa — Gestão de Projectos</p>
    </div>
  </footer>

  <script src="../js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/myprofile.js"></script>
  <script>
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tabName = btn.dataset.tab;
        
        document.querySelectorAll('.tab-btn').forEach(b => {
          b.style.borderBottomColor = 'transparent';
          b.style.color = '#666';
        });
        
        document.querySelectorAll('.tab-content').forEach(t => {
          t.style.display = 'none';
        });
        
        btn.style.borderBottomColor = 'var(--primary)';
        btn.style.color = 'var(--primary)';
        
        const content = document.querySelector(`[data-tab="${tabName}"]`);
        if (content) content.style.display = 'block';
      });
    });

    window.addEventListener('load', async () => {
      if (window.Auth) {
        await Auth.requireAuth('login.html');
        await Auth.autoHide();
      }
    });
  </script>
</body>
</html>
