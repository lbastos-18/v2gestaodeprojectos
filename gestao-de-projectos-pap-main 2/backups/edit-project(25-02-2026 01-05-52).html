<!DOCTYPE html>
<html lang="pt">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Editar Projeto</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
	<link rel="stylesheet" href="css/add-project.css">
</head>
<body>

<div id="siteNavbar"></div>

<main class="container py-4">
	<h1>Editar Projeto</h1>

	<form class="row g-3">
		<div class="col-md-6">
			<label class="form-label">Nome do Projeto</label>
			<input class="form-control" type="text" value="Sistema de Gestão Escolar">
		</div>
		<div class="col-md-3">
			<label class="form-label">Ano</label>
			<select class="form-select">
				<option>2025</option>
				<option>2024</option>
				<option>2023</option>
			</select>
		</div>
		<div class="col-md-3">
			<label class="form-label">Curso</label>
			<select class="form-select">
				<option>Informática</option>
				<option>Gestão Empresarial</option>
			</select>
		</div>

		<div class="col-12">
			<label class="form-label">Orientador</label>
			<input class="form-control" type="text" value="Prof. João Silva">
		</div>

		<div class="col-12">
			<label class="form-label">Resumo</label>
			<textarea class="form-control" rows="3">Resumo do projecto...</textarea>
		</div>

		<div class="col-12 d-flex justify-content-end">
			<a href="admindashboard.html" class="btn btn-outline-secondary me-2">Cancelar</a>
			<button class="btn btn-primary" type="submit"><i class="bi bi-save"></i> Guardar Alterações</button>
		</div>
	</form>

</main>

<script src="js/auth.js"></script>
<script>
	// only admins may access this page
	// window.addEventListener('load', function(){ if (window.Auth) Auth.requireAdmin('login.html'); });
</script>
<script src="js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
