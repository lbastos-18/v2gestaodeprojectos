<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Login | Gestão de Projetos</title>

    <!-- LIGAÇÃO DO CSS (CONFERE O CAMINHO!) -->
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <h2>Login</h2>

            <form>
                <label>Email</label>
                <input type="email" placeholder="Digite o email" required>

                <label>Password</label>
                <input type="password" placeholder="Digite a password" required>

                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>

</body>
</html>
